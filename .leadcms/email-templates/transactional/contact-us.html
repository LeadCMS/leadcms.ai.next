<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="format-detection" content="telephone=no, address=no, email=no, date=no" />
    <title>New Contact Us Submission</title>
    <!--[if mso]>
      <style type="text/css">
        body,
        table,
        td {
          font-family: Arial, Helvetica, sans-serif !important;
        }
      </style>
    <![endif]-->
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #fcfcff;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    "
  >
    <!-- Wrapper Table -->
    <table
      role="presentation"
      border="0"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      style="background-color: #fcfcff"
    >
      <tr>
        <td align="center" style="padding: 40px 20px">
          <!-- Main Container -->
          <table
            role="presentation"
            border="0"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="
              max-width: 520px;
              background-color: #ffffff;
              border-radius: 8px;
              box-shadow: 0 2px 12px rgba(11, 21, 37, 0.08);
            "
          >
            <!-- Header with accent bar -->
            <tr>
              <td
                style="
                  height: 4px;
                  background: linear-gradient(90deg, #3b82f6, #0b1525);
                  border-radius: 8px 8px 0 0;
                "
              ></td>
            </tr>
            <!-- Content -->
            <tr>
              <td style="padding: 40px 32px">
                <!-- Title -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td style="padding-bottom: 24px">
                      <h1
                        style="
                          margin: 0;
                          font-size: 24px;
                          font-weight: 700;
                          color: #3b82f6;
                          line-height: 1.3;
                        "
                      >
                        New Contact Us Submission
                      </h1>
                    </td>
                  </tr>
                </table>
                <!-- Contact Details Card -->
                <table
                  role="presentation"
                  border="0"
                  cellpadding="0"
                  cellspacing="0"
                  width="100%"
                  style="background-color: #fcfcff; border-radius: 6px; border: 1px solid #e5e5e5"
                >
                  <tr>
                    <td style="padding: 24px">
                      <!-- From -->
                      <table
                        role="presentation"
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="100%"
                      >
                        <tr>
                          <td style="padding-bottom: 16px">
                            <span
                              style="
                                display: block;
                                font-size: 12px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                color: #737373;
                                margin-bottom: 4px;
                              "
                              >From</span
                            >
                            <span style="font-size: 15px; color: #0a0a0a"
                              >&lt;<%fromEmail%>&gt;</span
                            >
                          </td>
                        </tr>
                      </table>
                      <!-- Name Row -->
                      <table
                        role="presentation"
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="100%"
                      >
                        <tr>
                          <td
                            width="50%"
                            style="padding-bottom: 16px; padding-right: 12px; vertical-align: top"
                          >
                            <span
                              style="
                                display: block;
                                font-size: 12px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                color: #737373;
                                margin-bottom: 4px;
                              "
                              >First Name</span
                            >
                            <span style="font-size: 15px; color: #0a0a0a"><%firstName%></span>
                          </td>
                          <td
                            width="50%"
                            style="padding-bottom: 16px; padding-left: 12px; vertical-align: top"
                          >
                            <span
                              style="
                                display: block;
                                font-size: 12px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                color: #737373;
                                margin-bottom: 4px;
                              "
                              >Last Name</span
                            >
                            <span style="font-size: 15px; color: #0a0a0a"><%lastName%></span>
                          </td>
                        </tr>
                      </table>
                      <!-- Company -->
                      <table
                        role="presentation"
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="100%"
                      >
                        <tr>
                          <td style="padding-bottom: 16px">
                            <span
                              style="
                                display: block;
                                font-size: 12px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                color: #737373;
                                margin-bottom: 4px;
                              "
                              >Company</span
                            >
                            <span style="font-size: 15px; color: #0a0a0a"><%company%></span>
                          </td>
                        </tr>
                      </table>
                      <!-- Subject -->
                      <table
                        role="presentation"
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="100%"
                      >
                        <tr>
                          <td>
                            <span
                              style="
                                display: block;
                                font-size: 12px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.5px;
                                color: #737373;
                                margin-bottom: 4px;
                              "
                              >Subject</span
                            >
                            <span style="font-size: 15px; color: #0a0a0a"><%subject%></span>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
                <!-- Message Section -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td style="padding-top: 24px; padding-bottom: 8px">
                      <span
                        style="
                          display: block;
                          font-size: 12px;
                          font-weight: 600;
                          text-transform: uppercase;
                          letter-spacing: 0.5px;
                          color: #737373;
                        "
                        >Message</span
                      >
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        padding: 20px;
                        background-color: #fcfcff;
                        border-radius: 6px;
                        border-left: 4px solid #3b82f6;
                      "
                    >
                      <p
                        style="
                          margin: 0;
                          font-size: 15px;
                          line-height: 1.7;
                          color: #0a0a0a;
                          font-style: italic;
                        "
                      >
                        "<%message%>"
                      </p>
                    </td>
                  </tr>
                </table>
                <!-- Divider -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td style="padding-top: 32px; padding-bottom: 16px">
                      <div style="height: 1px; background-color: #e5e5e5"></div>
                    </td>
                  </tr>
                </table>
                <!-- Footer -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td style="font-size: 13px; line-height: 1.5; color: #737373">
                      This message was sent via the Contact Us form.
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!-- Footer note -->
          <table
            role="presentation"
            border="0"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="max-width: 520px"
          >
            <tr>
              <td
                align="center"
                style="padding: 24px 32px; font-size: 12px; line-height: 1.5; color: #737373"
              >
                This is an automated notification from LeadCMS.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
